spring.application.name=booktracker

# --- MYSQL CONFIGURATION ---

# 1. Verbindung (Standard-Port ist 3306)
# Stelle sicher, dass die Datenbank 'booktracker' in MySQL existiert!
spring.datasource.url=jdbc:mysql://localhost:3306/booktracker?serverTimezone=UTC
spring.datasource.username=root
#spring.datasource.password=deinPasswort

# 2. JPA / Hibernate Einstellungen
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# MySQL-spezifischer Dialekt
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
