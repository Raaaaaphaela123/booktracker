spring.application.name=booktracker

# --- DATABASE CONFIGURATION (SAFE & FLEXIBLE) ---

# 1. Verbindung
# Wir nutzen Variablen. Wenn DB_URL nicht gesetzt ist, wird der lokale MySQL-Pfad genommen.
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/booktracker?serverTimezone=UTC}

# 2. Benutzerdaten
# Auch hier: Nutze die Variable DB_USER, sonst Standard 'root'
spring.datasource.username=${DB_USER:root}

# 3. Passwort (WICHTIG!)
# Hier setzen wir KEINEN Standardwert. Das Passwort kommt nur aus der Umgebungsvariable DB_PASSWORD.
spring.datasource.password=${DB_PASSWORD}

# --- JPA / HIBERNATE EINSTELLUNGEN ---
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# MySQL-spezifischer Dialekt
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect